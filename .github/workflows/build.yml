name: Build All Apps (Mac + Windows)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── macOS builds ───────────────────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller pywebview pyobjc-core pyobjc-framework-WebKit pyobjc-framework-Cocoa reportlab psutil

      - name: Build MeetingMeter (Mac)
        run: python -m PyInstaller meetingmeter.spec --distpath ./dist --workpath ./build --noconfirm

      - name: Zip MeetingMeter
        run: zip -r MeetingMeter-mac.zip dist/MeetingMeter.app

      - name: Build SystemMonitor (Mac)
        run: python -m PyInstaller systemmonitor.spec --distpath ./dist --workpath ./build --noconfirm

      - name: Zip SystemMonitor
        run: zip -r SystemMonitor-mac.zip dist/SystemMonitor.app

      - name: Upload MeetingMeter Mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: MeetingMeter-mac
          path: MeetingMeter-mac.zip

      - name: Upload SystemMonitor Mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: SystemMonitor-mac
          path: SystemMonitor-mac.zip

  # ── Windows builds ─────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller pywebview pythonnet reportlab psutil

      - name: Build MeetingMeter (Windows)
        run: python -m PyInstaller meetingmeter_win.spec --distpath ./dist --workpath ./build --noconfirm

      - name: Zip MeetingMeter
        run: Compress-Archive -Path dist/MeetingMeter.exe -DestinationPath MeetingMeter-win.zip

      - name: Build SystemMonitor (Windows)
        run: python -m PyInstaller systemmonitor_win.spec --distpath ./dist --workpath ./build --noconfirm

      - name: Zip SystemMonitor
        run: Compress-Archive -Path dist/SystemMonitor.exe -DestinationPath SystemMonitor-win.zip

      - name: Upload MeetingMeter Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: MeetingMeter-win
          path: MeetingMeter-win.zip

      - name: Upload SystemMonitor Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: SystemMonitor-win
          path: SystemMonitor-win.zip

  # ── Release ────────────────────────────────────────────────────────────────
  release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build ${{ github.run_number }}
          draft: true
          files: |
            MeetingMeter-mac/MeetingMeter-mac.zip
            MeetingMeter-win/MeetingMeter-win.zip
            SystemMonitor-mac/SystemMonitor-mac.zip
            SystemMonitor-win/SystemMonitor-win.zip
