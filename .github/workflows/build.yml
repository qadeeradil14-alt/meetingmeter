name: Build MeetingMeter (Mac + Windows)

on:
  push:
    branches: [main]
  workflow_dispatch:   # Allows manual trigger from GitHub Actions tab

jobs:
  # ── macOS build ────────────────────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller pywebview pyobjc-core pyobjc-framework-WebKit pyobjc-framework-Cocoa reportlab

      - name: Build macOS app
        run: python -m PyInstaller meetingmeter.spec --distpath ./dist --workpath ./build --noconfirm

      - name: Zip app bundle
        run: zip -r MeetingMeter-mac.zip dist/MeetingMeter.app

      - name: Upload Mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: MeetingMeter-mac
          path: MeetingMeter-mac.zip

  # ── Create private draft release (not publicly visible) ───────────────────
  release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Mac artifact
        uses: actions/download-artifact@v4
        with:
          name: MeetingMeter-mac

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: MeetingMeter-win

      - name: Create draft release (private — not publicly visible)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: MeetingMeter Build ${{ github.run_number }}
          draft: true
          files: |
            MeetingMeter-mac.zip
            MeetingMeter-win.zip

  # ── Windows build ──────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller pywebview pythonnet reportlab

      - name: Build Windows exe
        run: python -m PyInstaller meetingmeter_win.spec --distpath ./dist --workpath ./build --noconfirm

      - name: Zip exe
        run: Compress-Archive -Path dist/MeetingMeter.exe -DestinationPath MeetingMeter-win.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: MeetingMeter-win
          path: MeetingMeter-win.zip

